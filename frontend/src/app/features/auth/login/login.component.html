<div class="flex min-h-screen items-center justify-center bg-gray-900">
  <mat-card class="w-full max-w-md p-6">
    <mat-card-title class="mb-6 text-center text-2xl font-bold">Cyber-Vault</mat-card-title>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" title="Email" placeholder="exemple@email.com" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Mot de passe</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="current-password" title="Mot de passe" placeholder="••••••••" />
      </mat-form-field>

      @if (error$ | async; as error) {
        <p class="text-sm text-red-500">{{ error }}</p>
      }

      <button mat-flat-button color="primary" type="submit" [disabled]="loading$ | async">
        {{ (loading$ | async) ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <p class="mt-4 text-center text-sm">
      Pas de compte ? <a routerLink="/auth/register" class="text-blue-400 hover:underline">S'inscrire</a>
    </p>
  </mat-card>
</div>
