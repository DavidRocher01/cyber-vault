<div class="flex min-h-screen items-center justify-center bg-gray-900 p-4">
  <mat-card class="w-full max-w-md p-6">
    <h2 class="mb-6 text-center text-2xl font-bold text-gray-100">Mot de passe maître</h2>
    <p class="mb-4 text-center text-sm text-gray-400">
      Ce mot de passe est utilisé pour chiffrer vos entrées. Il n'est jamais envoyé au serveur.
    </p>

    @if (error) {
      <p class="mb-4 rounded bg-red-900 px-4 py-2 text-sm text-red-200">{{ error }}</p>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <mat-form-field appearance="outline">
        <mat-label>Mot de passe maître</mat-label>
        <input matInput type="password" formControlName="masterPassword" />
        @if (form.controls.masterPassword.errors?.['minlength']) {
          <mat-error>Minimum 8 caractères</mat-error>
        }
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Chargement…' : 'Déverrouiller le vault' }}
      </button>
    </form>
  </mat-card>
</div>
