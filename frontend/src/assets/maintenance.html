<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Maintenance — CyberScan</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 0%, #0b1220 0%, #060a12 100%);
        color: #e2e8f0;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        text-align: center;
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #22d3ee;
        border: 1px solid #155e75;
        border-radius: 999px;
        padding: 4px 14px;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 28px;
        margin: 0 0 12px;
        color: #fff;
      }
      p {
        font-size: 16px;
        line-height: 1.6;
        color: #94a3b8;
        margin: 0 0 8px;
      }
      .spinner {
        width: 42px;
        height: 42px;
        margin: 28px auto 0;
        border: 3px solid #1e293b;
        border-top-color: #22d3ee;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .foot {
        margin-top: 28px;
        font-size: 13px;
        color: #64748b;
      }
      .foot a {
        color: #22d3ee;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">CyberScan</span>
      <h1>Maintenance en cours</h1>
      <p>
        Nous déployons une mise à jour de sécurité importante. Le service est momentanément
        indisponible.
      </p>
      <p>Merci de revenir dans quelques minutes.</p>
      <div class="spinner" aria-hidden="true"></div>
      <p class="foot">
        Une question ? <a href="mailto:contact@cyberscanapp.com">contact@cyberscanapp.com</a>
      </p>
    </main>
  </body>
</html>
