[pytest]
# Config isolee : la recette tape une instance deployee, PAS de coverage ni de
# testcontainers (contrairement au pytest.ini racine). Tests 100% synchrones
# (httpx.Client) -> aucun plugin asyncio requis. On la lance avec
#   python -m pytest recette/ -c recette/pytest.ini
addopts = -ra --tb=short -p no:cacheprovider
testpaths = .
python_files = test_*.py
