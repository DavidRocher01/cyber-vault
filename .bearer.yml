# Bearer SAST configuration
# Suppress intentional patterns that are not security vulnerabilities

scan:
  # File path findings in scanner/service code are false positives:
  # - code_scan_service.py: all paths are within tempfile.mkdtemp() directories
  # - remediation.py: output_dir is always a TemporaryDirectory
  # - sca_checker.py / secrets_checker.py: repo_dir is a temp directory
  # - email_service.py: pdf_path comes from internal scan results, not user input
  exclude_fingerprints:
    - 6e5c70f2ab7e6a254c4e08bc0dddb1e7  # file path — temp dir pattern

  # Scanner modules intentionally use verify=False to scan sites with bad certs
  # and test deprecated TLS versions on target hosts
  exclude_rules:
    - ruby_lang_file_generation
