services:
  # PostgreSQL utilisé uniquement en local pour simuler la prod.
  # En production AWS : RDS PostgreSQL t4g.micro (géré par AWS).
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybervault_prod_backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}        # RDS en prod : postgresql+asyncpg://user:pass@rds-endpoint/db
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
      HIBP_API_KEY: ${HIBP_API_KEY:-}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cybervault_prod_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
