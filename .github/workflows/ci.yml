# checkov:skip=CKV2_GHA_1: Actions pinned to major version tags — SHA pinning handled via Dependabot
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cybervault_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.prod.txt

      - name: Install dependencies
        run: pip install -r requirements.prod.txt aiosqlite bandit pip-audit pytest pytest-asyncio httpx email-validator pytest-cov "testcontainers[postgres]"
        working-directory: backend

      - name: Bandit (sécurité statique)
        run: bandit -r app/ -ll
        working-directory: backend

      - name: pip-audit (vulnérabilités)
        # GHSA-jr27-m4p2-rc6r : pyasn1 — python-jose@3.4.0 impose pyasn1<0.5.0, upgrade impossible sans migration JWT
        # GHSA-f96h-pmfr-66vw : starlette — fastapi@0.111.0 impose starlette<0.38.0, upgrade vers fastapi≥0.114 casse 44 tests (breaking changes)
        # GHSA-2c2j-9gv5-cj73 : starlette — même raison, sera traité lors de la migration fastapi
        # PYSEC-2026-161 : starlette 0.37.2 — fix = 1.0.1 incompatible avec fastapi@0.111.0, sera traité lors de la migration fastapi
        run: pip-audit --ignore-vuln GHSA-jr27-m4p2-rc6r --ignore-vuln GHSA-f96h-pmfr-66vw --ignore-vuln GHSA-2c2j-9gv5-cj73 --ignore-vuln PYSEC-2026-161
        working-directory: backend

      - name: Alembic migrations check
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/cybervault_test
        run: python -m alembic upgrade head
        working-directory: backend

      - name: Pytest
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/cybervault_test
        run: |
          set -o pipefail
          mkdir -p ../test-results
          pytest tests/ -v --tb=short \
            --junit-xml=../test-results/backend-junit.xml \
            2>&1 | tee ../test-results/backend-verbose.txt
        working-directory: backend

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            test-results/backend-junit.xml
            test-results/backend-verbose.txt

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: Vitest (tests unitaires + couverture)
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/test-results/results.xml

      - name: Build
        run: npm run build
        working-directory: frontend

  # ── Rapport de tests PDF ────────────────────────────────────────────────────
  test-report:
    name: Rapport de tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download backend results
        uses: actions/download-artifact@v4
        with:
          name: backend-test-results
          path: test-results
        continue-on-error: true

      - name: Download frontend results
        uses: actions/download-artifact@v4
        with:
          name: frontend-test-results
          path: test-results
        continue-on-error: true

      - name: Parse results and write summary
        run: |
          VERSION=$(grep -oP "APP_VERSION = '\K[^']+" frontend/src/app/core/version.ts || echo "?")
          DATE=$(date +%Y-%m-%d)

          if [ -f test-results/backend-junit.xml ]; then
            BE_TESTS=$(grep -oP 'tests="\K[^"]+' test-results/backend-junit.xml | head -1 || echo "?")
            BE_FAIL=$(grep -oP 'failures="\K[^"]+' test-results/backend-junit.xml | head -1 || echo "0")
            BE_ERR=$(grep -oP 'errors="\K[^"]+' test-results/backend-junit.xml | head -1 || echo "0")
            BE_SKIP=$(grep -oP 'skipped="\K[^"]+' test-results/backend-junit.xml | head -1 || echo "0")
            BE_PASS=$(( ${BE_TESTS:-0} - ${BE_FAIL:-0} - ${BE_ERR:-0} - ${BE_SKIP:-0} ))
            BE_STATUS=$([ "$BE_FAIL" = "0" ] && [ "$BE_ERR" = "0" ] && echo "✅" || echo "❌")
          else
            BE_TESTS="?" BE_PASS="?" BE_FAIL="?" BE_STATUS="⚠️"
          fi

          if [ -f test-results/results.xml ]; then
            FE_TESTS=$(grep -oP 'tests="\K[^"]+' test-results/results.xml | head -1 || echo "?")
            FE_FAIL=$(grep -oP 'failures="\K[^"]+' test-results/results.xml | head -1 || echo "0")
            FE_PASS=$(( ${FE_TESTS:-0} - ${FE_FAIL:-0} ))
            FE_STATUS=$([ "$FE_FAIL" = "0" ] && echo "✅" || echo "❌")
          else
            FE_TESTS="?" FE_PASS="?" FE_FAIL="?" FE_STATUS="⚠️"
          fi

          TOTAL_TESTS=$(( ${BE_TESTS:-0} + ${FE_TESTS:-0} ))
          TOTAL_PASS=$(( ${BE_PASS:-0} + ${FE_PASS:-0} ))
          TOTAL_FAIL=$(( ${BE_FAIL:-0} + ${FE_FAIL:-0} ))
          GLOBAL=$([ "$TOTAL_FAIL" = "0" ] && echo "✅ SUCCÈS" || echo "❌ ÉCHEC")

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🧪 Rapport de tests — v${VERSION} (${DATE})

          **Résultat global : ${GLOBAL}**

          | Composant | Tests | Réussis | Échoués | Statut |
          |-----------|------:|--------:|--------:|:------:|
          | Backend (pytest) | ${BE_TESTS} | ${BE_PASS} | ${BE_FAIL} | ${BE_STATUS} |
          | Frontend (Vitest) | ${FE_TESTS} | ${FE_PASS} | ${FE_FAIL} | ${FE_STATUS} |
          | **Total** | **${TOTAL_TESTS}** | **${TOTAL_PASS}** | **${TOTAL_FAIL}** | ${GLOBAL%% *} |

          > Artifacts disponibles : \`backend-test-results\` · \`frontend-test-results\` · \`test-report-pdf\`
          EOF

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install reportlab
        run: pip install reportlab

      - name: Generate PDF test report
        run: |
          python backend/scripts/build_report_from_output.py \
            test-results/backend-verbose.txt \
            test-results/test-report.pdf
        continue-on-error: true

      - name: Upload PDF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-pdf
          path: test-results/test-report.pdf
          retention-days: 90

  # ── Couverture de code ──────────────────────────────────────────────────────
  coverage:
    name: Couverture de code
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.prod.txt

      - name: Install dependencies
        run: pip install -r requirements.prod.txt aiosqlite pytest pytest-asyncio httpx email-validator pytest-cov
        working-directory: backend

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=html:coverage-html \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            -q
        working-directory: backend

      - name: Write coverage summary
        run: |
          TOTAL=$(python -c "import json; d=json.load(open('backend/coverage.json')); print(round(d['totals']['percent_covered']))")
          COLOR=$(python -c "t=$TOTAL; print('brightgreen' if t>=90 else 'yellow' if t>=70 else 'red')")
          echo "### 📊 Couverture de code : **${TOTAL}%**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "![coverage](https://img.shields.io/badge/coverage-${TOTAL}%25-${COLOR})" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage-html/
          retention-days: 30

  # ── E2E Playwright ──────────────────────────────────────────────────────────
  e2e:
    name: E2E Playwright
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cybervault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.prod.txt

      - name: Install backend dependencies
        run: pip install -r requirements.prod.txt
        working-directory: backend

      - name: Run Alembic migrations
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/cybervault
        run: python -m alembic upgrade head
        working-directory: backend

      - name: Start backend
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/cybervault
          ALLOWED_ORIGINS: '["http://localhost:4200"]'
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        working-directory: backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Playwright tests
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
