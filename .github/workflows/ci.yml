# checkov:skip=CKV2_GHA_1: Actions pinned to major version tags — SHA pinning handled via Dependabot
name: CI

on:
  push:
    branches: [main, master, develop]
    # Un commit qui ne touche que de la doc n'a rien a faire tester (~32 min de
    # runner economisees a chaque fois). Le code, les workflows et les deps
    # declenchent toujours la CI.
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".gitignore"
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cybervault_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: "pip"
          # Les deux fichiers comptent : requirements.txt tire requirements.prod.txt.
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        # requirements.txt = `-r requirements.prod.txt` (runtime EXACT de la prod)
        # + les outils de dev/test EPINGLES. On installe donc ici exactement ce que
        # le venv local a. Auparavant la liste etait ecrite a la main et NON epinglee
        # (pytest, ruff, mypy... en derniere version) : la CI divergeait du local et
        # pouvait casser toute seule a la sortie d'une nouvelle version d'outil.
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: backend

      - name: Ruff (lint)
        run: ruff check app/
        working-directory: backend

      - name: Mypy (typage statique)
        run: mypy app/
        working-directory: backend

      - name: Bandit (sécurité statique)
        run: bandit -r app/ -ll
        working-directory: backend

      - name: pip-audit (vulnérabilités)
        # Objectif : ZÉRO CVE ignorée. Chaîne python-jose/pyasn1 supprimée (migration
        # vers PyJWT) et starlette/fastapi remontés (fastapi 0.138.1 / starlette 1.3.1)
        # → les 9 CVE précédemment ignorées sont corrigées.
        run: pip-audit
        working-directory: backend

      - name: Validate awareness content (YAML + Markdown)
        run: python scripts/validate_awareness_content.py
        working-directory: backend

      - name: Alembic migrations (up + down + up)
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/cybervault_test
        # Applique toute la chaîne depuis zéro, puis teste la réversibilité de la dernière
        # migration (downgrade -1) et sa ré-application. Attrape une migration non réversible
        # AVANT qu'elle ne casse un déploiement (le deploy joue `alembic upgrade head`).
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade -1
          python -m alembic upgrade head
        working-directory: backend

      - name: Pytest + couverture
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/cybervault_test
        run: |
          set -o pipefail
          mkdir -p ../test-results
          pytest tests/ --tb=short \
            --cov-report=json:../coverage.json \
            --cov-report=html:../coverage-html \
            --junit-xml=../test-results/backend-junit.xml \
            2>&1 | tee ../test-results/backend-verbose.txt
        working-directory: backend

      - name: Résumé couverture
        if: always()
        run: |
          if [ -f coverage.json ]; then
            TOTAL=$(python -c "import json; d=json.load(open('coverage.json')); print(round(d['totals']['percent_covered']))")
            COLOR=$(python -c "t=$TOTAL; print('brightgreen' if t>=90 else 'yellow' if t>=70 else 'red')")
            echo "### 📊 Couverture de code : **${TOTAL}%**" >> $GITHUB_STEP_SUMMARY
            echo "![coverage](https://img.shields.io/badge/coverage-${TOTAL}%25-${COLOR})" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-test-results
          path: |
            test-results/backend-junit.xml
            test-results/backend-verbose.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage-html/
          retention-days: 30

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: npm audit (CVE deps prod — gate high)
        run: npm audit --audit-level=high --omit=dev
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: Vitest (tests unitaires + couverture)
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-test-results
          path: frontend/test-results/results.xml

      - name: Build
        run: npm run build
        working-directory: frontend

  # ── Rapport de tests PDF ────────────────────────────────────────────────────
  test-report:
    name: Rapport de tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download backend results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: backend-test-results
          path: test-results
        continue-on-error: true

      - name: Download frontend results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-test-results
          path: test-results
        continue-on-error: true

      - name: Parse results and write summary
        run: |
          VERSION=$(grep -oP "APP_VERSION = '\K[^']+" frontend/src/app/core/version.ts || echo "?")
          DATE=$(date +%Y-%m-%d)

          if [ -f test-results/backend-junit.xml ]; then
            BE_TESTS=$(grep -oP 'tests="\K[^"]+' test-results/backend-junit.xml | head -1 || echo "?")
            BE_FAIL=$(grep -oP 'failures="\K[^"]+' test-results/backend-junit.xml | head -1 || echo "0")
            BE_ERR=$(grep -oP 'errors="\K[^"]+' test-results/backend-junit.xml | head -1 || echo "0")
            BE_SKIP=$(grep -oP 'skipped="\K[^"]+' test-results/backend-junit.xml | head -1 || echo "0")
            BE_PASS=$(( ${BE_TESTS:-0} - ${BE_FAIL:-0} - ${BE_ERR:-0} - ${BE_SKIP:-0} ))
            BE_STATUS=$([ "$BE_FAIL" = "0" ] && [ "$BE_ERR" = "0" ] && echo "✅" || echo "❌")
          else
            BE_TESTS="?" BE_PASS="?" BE_FAIL="?" BE_STATUS="⚠️"
          fi

          if [ -f test-results/results.xml ]; then
            FE_TESTS=$(grep -oP 'tests="\K[^"]+' test-results/results.xml | head -1 || echo "?")
            FE_FAIL=$(grep -oP 'failures="\K[^"]+' test-results/results.xml | head -1 || echo "0")
            FE_PASS=$(( ${FE_TESTS:-0} - ${FE_FAIL:-0} ))
            FE_STATUS=$([ "$FE_FAIL" = "0" ] && echo "✅" || echo "❌")
          else
            FE_TESTS="?" FE_PASS="?" FE_FAIL="?" FE_STATUS="⚠️"
          fi

          TOTAL_TESTS=$(( ${BE_TESTS:-0} + ${FE_TESTS:-0} ))
          TOTAL_PASS=$(( ${BE_PASS:-0} + ${FE_PASS:-0} ))
          TOTAL_FAIL=$(( ${BE_FAIL:-0} + ${FE_FAIL:-0} ))
          GLOBAL=$([ "$TOTAL_FAIL" = "0" ] && echo "✅ SUCCÈS" || echo "❌ ÉCHEC")

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🧪 Rapport de tests — v${VERSION} (${DATE})

          **Résultat global : ${GLOBAL}**

          | Composant | Tests | Réussis | Échoués | Statut |
          |-----------|------:|--------:|--------:|:------:|
          | Backend (pytest) | ${BE_TESTS} | ${BE_PASS} | ${BE_FAIL} | ${BE_STATUS} |
          | Frontend (Vitest) | ${FE_TESTS} | ${FE_PASS} | ${FE_FAIL} | ${FE_STATUS} |
          | **Total** | **${TOTAL_TESTS}** | **${TOTAL_PASS}** | **${TOTAL_FAIL}** | ${GLOBAL%% *} |

          > Artifacts disponibles : \`backend-test-results\` · \`frontend-test-results\` · \`test-report-pdf\`
          EOF

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install reportlab
        run: pip install reportlab

      - name: Generate PDF test report
        run: |
          python backend/scripts/build_report_from_output.py \
            test-results/backend-verbose.txt \
            test-results/test-report.pdf
        continue-on-error: true

      - name: Upload PDF report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-report-pdf
          path: test-results/test-report.pdf
          retention-days: 90

  # ── E2E Playwright ──────────────────────────────────────────────────────────
  e2e:
    name: E2E Playwright
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cybervault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: backend/requirements.prod.txt

      - name: Install backend dependencies
        run: pip install -r requirements.prod.txt
        working-directory: backend

      - name: Run Alembic migrations
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/cybervault
        run: python -m alembic upgrade head
        working-directory: backend

      - name: Start backend
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/cybervault
          ALLOWED_ORIGINS: '["http://localhost:4200"]'
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid
          echo "uvicorn started (PID $(cat /tmp/uvicorn.pid))"
        working-directory: backend

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend on :8000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend ready after $((i * 2))s"
              exit 0
            fi
            echo "  attempt $i/30..."
            sleep 2
          done
          echo "Backend did not start after 60s — uvicorn logs:"
          cat /tmp/uvicorn.log || echo "(no log file)"
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Playwright tests
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report/
