name: Deploy — Production

on:
  push:
    branches: [main]

# Ne déployer qu'après que le CI soit vert
jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: []   # Décommenté quand le CI est dans le même fichier ou workflow
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Angular ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Angular (production)
        run: npm run build -- --configuration=production
        working-directory: frontend

      # ── Deploy frontend → EC2 via SSH ────────────────────────────
      - name: Deploy frontend to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/cyber-vault-frontend/browser/*"
          target: "/var/www/cybervault"
          strip_components: 4   # retire frontend/dist/cyber-vault-frontend/browser/

      # ── Deploy backend → EC2 via SSH ─────────────────────────────
      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/cybervault

            # Récupérer le dernier code
            git pull origin main

            # Reconstruire et redémarrer le backend
            docker compose -f docker-compose.production.yml build backend
            docker compose -f docker-compose.production.yml up -d --no-deps backend

            # Nettoyer les images inutilisées
            docker image prune -f

            echo "Backend déployé avec succès."
