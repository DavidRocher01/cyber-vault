# checkov:skip=CKV2_GHA_1: Actions pinned to major version tags — SHA pinning handled via Dependabot
name: Deploy — Production

on:
  push:
    branches: [main, master]

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: cybervault-backend

jobs:
  # ── Backend : ECR → App Runner ──────────────────────────────────────────────
  deploy-backend:
    name: Backend → ECR + App Runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build -f backend/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push    $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag     $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                         $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push    $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to ECS
        env:
          ECR_REGISTRY:           ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:               ${{ github.sha }}
          STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET:   ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
          FRONTEND_URL:            ${{ secrets.FRONTEND_URL }}
          ADMIN_API_KEY:           ${{ secrets.ADMIN_API_KEY }}
          RESEND_API_KEY:          ${{ secrets.RESEND_API_KEY }}
          SENTRY_DSN:              ${{ secrets.SENTRY_DSN_BACKEND }}
        run: |
          # Retrieve the current task definition ARN from the service
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE }} \
            --query 'services[0].taskDefinition' \
            --output text)

          # Build a new task definition JSON:
          #   - update the Docker image
          #   - inject/update Stripe + SMTP + app env vars from GitHub Secrets
          #     (existing env vars not listed here are kept as-is)
          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query 'taskDefinition' \
            --output json | jq \
              --arg IMAGE                 "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
              --arg STRIPE_SECRET_KEY     "$STRIPE_SECRET_KEY" \
              --arg STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET" \
              --arg SMTP_USER             "$SMTP_USER" \
              --arg SMTP_PASSWORD         "$SMTP_PASSWORD" \
              --arg FRONTEND_URL          "$FRONTEND_URL" \
              --arg ADMIN_API_KEY         "$ADMIN_API_KEY" \
              --arg RESEND_API_KEY        "$RESEND_API_KEY" \
              --arg SENTRY_DSN           "$SENTRY_DSN" \
              'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
               | .containerDefinitions[0].image = $IMAGE
               | .containerDefinitions[0].environment = (
                   (.containerDefinitions[0].environment // [])
                   | map(select(
                       .name != "STRIPE_SECRET_KEY" and
                       .name != "STRIPE_WEBHOOK_SECRET" and
                       .name != "SMTP_USER" and
                       .name != "SMTP_PASSWORD" and
                       .name != "FRONTEND_URL" and
                       .name != "ADMIN_API_KEY" and
                       .name != "RESEND_API_KEY" and
                       .name != "SENTRY_DSN"
                     ))
                   + [
                       {"name": "STRIPE_SECRET_KEY",     "value": $STRIPE_SECRET_KEY},
                       {"name": "STRIPE_WEBHOOK_SECRET", "value": $STRIPE_WEBHOOK_SECRET},
                       {"name": "SMTP_USER",             "value": $SMTP_USER},
                       {"name": "SMTP_PASSWORD",         "value": $SMTP_PASSWORD},
                       {"name": "FRONTEND_URL",          "value": $FRONTEND_URL},
                       {"name": "ADMIN_API_KEY",         "value": $ADMIN_API_KEY},
                       {"name": "RESEND_API_KEY",        "value": $RESEND_API_KEY},
                       {"name": "SENTRY_DSN",            "value": $SENTRY_DSN}
                     ]
                 )')

          # Register the new revision
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Update the service to use the new revision
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --task-definition "$NEW_ARN"

  # ── Frontend : S3 + CloudFront ──────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build (production)
        run: npm ci --legacy-peer-deps && npm run build -- --configuration=production
        working-directory: frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync assets (cache long terme — hash dans le nom de fichier)
        run: |
          aws s3 sync frontend/dist/cyber-vault-frontend/browser/ \
            s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html (pas de cache)
        run: |
          aws s3 cp frontend/dist/cyber-vault-frontend/browser/index.html \
            s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Configure CloudFront SPA error pages (403/404 → index.html)
        run: |
          DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          CONFIG=$(aws cloudfront get-distribution-config --id "$DIST_ID")
          ETAG=$(echo "$CONFIG" | jq -r '.ETag')
          UPDATED=$(echo "$CONFIG" | jq '.DistributionConfig | .CustomErrorResponses = {
            "Quantity": 2,
            "Items": [
              {"ErrorCode": 403, "ResponsePagePath": "/index.html", "ResponseCode": "200", "ErrorCachingMinTTL": 300},
              {"ErrorCode": 404, "ResponsePagePath": "/index.html", "ResponseCode": "200", "ErrorCachingMinTTL": 300}
            ]
          }')
          aws cloudfront update-distribution \
            --id "$DIST_ID" \
            --distribution-config "$UPDATED" \
            --if-match "$ETAG"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
