# checkov:skip=CKV2_GHA_1: Actions pinned to major version tags — SHA pinning handled via Dependabot
name: Deploy — Production

on:
  push:
    branches: [main, master]

permissions:
  id-token: write   # required for OIDC token request
  contents: read

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: cybervault-backend

jobs:
  # ── Backend : ECR → ECS ─────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → ECR + ECS
    runs-on: ubuntu-latest
    outputs:
      # Exposees pour le job `recette` : cible du rollback (revision AVANT ce
      # deploiement) et revision fraichement deployee.
      prev_task_def: ${{ steps.deploy.outputs.prev_task_def }}
      new_task_def: ${{ steps.deploy.outputs.new_task_def }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Build & push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build -f backend/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push    $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag     $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                         $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push    $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Register task def (new image), run migrations, then deploy
        id: deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
          SM_ARN: ${{ secrets.AWS_SM_ARN }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail

          NETWORK_CONFIG=$(aws ecs describe-services             --cluster ${{ secrets.ECS_CLUSTER }}             --services ${{ secrets.ECS_SERVICE }}             --query 'services[0].networkConfiguration'             --output json)

          TASK_DEF_ARN=$(aws ecs describe-services             --cluster ${{ secrets.ECS_CLUSTER }}             --services ${{ secrets.ECS_SERVICE }}             --query 'services[0].taskDefinition'             --output text)

          # Cible du rollback : la revision actuellement en service (AVANT deploy).
          echo "prev_task_def=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

          # New task definition with the freshly built image + Secrets Manager refs
          NEW_TASK_DEF=$(aws ecs describe-task-definition             --task-definition "$TASK_DEF_ARN"             --query 'taskDefinition'             --output json | jq               --arg IMAGE      "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"               --arg SM_ARN     "$SM_ARN"               --arg PK_LIVE    "$STRIPE_PUBLISHABLE_KEY"               'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
               | .cpu = "1024"
               | .memory = "2048"
               | .taskRoleArn = "arn:aws:iam::328646895533:role/cybervault-ecs-task-role"
               | .containerDefinitions[0].image = $IMAGE
               | .containerDefinitions[0].environment = (
                   (.containerDefinitions[0].environment // [])
                   | map(select(
                       .name != "SECRET_KEY" and
                       .name != "DATABASE_URL" and
                       .name != "STRIPE_SECRET_KEY" and
                       .name != "STRIPE_WEBHOOK_SECRET" and
                       .name != "SMTP_PASSWORD" and
                       .name != "ADMIN_API_KEY" and
                       .name != "RESEND_API_KEY" and
                       .name != "SENTRY_DSN" and
                       .name != "STRIPE_PUBLISHABLE_KEY" and
                       .name != "S3_BUCKET_NAME"
                     ))
                 + [{"name": "STRIPE_PUBLISHABLE_KEY", "value": $PK_LIVE},
                    {"name": "S3_BUCKET_NAME",         "value": "cybervault-rssi-deliverables-prod"}]
                 )
               | .containerDefinitions[0].secrets = [
                   {"name": "SECRET_KEY",            "valueFrom": ($SM_ARN + ":SECRET_KEY::")},
                   {"name": "DATABASE_URL",          "valueFrom": ($SM_ARN + ":DATABASE_URL::")},
                   {"name": "STRIPE_SECRET_KEY",     "valueFrom": ($SM_ARN + ":STRIPE_SECRET_KEY::")},
                   {"name": "STRIPE_WEBHOOK_SECRET", "valueFrom": ($SM_ARN + ":STRIPE_WEBHOOK_SECRET::")},
                   {"name": "SMTP_PASSWORD",         "valueFrom": ($SM_ARN + ":SMTP_PASSWORD::")},
                   {"name": "ADMIN_API_KEY",         "valueFrom": ($SM_ARN + ":ADMIN_API_KEY::")},
                   {"name": "RESEND_API_KEY",        "valueFrom": ($SM_ARN + ":RESEND_API_KEY::")},
                   {"name": "SENTRY_DSN",            "valueFrom": ($SM_ARN + ":SENTRY_DSN::")}
                 ]')

          # Register the new revision FIRST so migrations run with the NEW image
          NEW_ARN=$(aws ecs register-task-definition             --cli-input-json "$NEW_TASK_DEF"             --query 'taskDefinition.taskDefinitionArn'             --output text)
          echo "New task definition: $NEW_ARN"
          echo "new_task_def=$NEW_ARN" >> "$GITHUB_OUTPUT"

          # Run Alembic migrations one-shot using the NEW image
          TASK_ARN=$(aws ecs run-task             --cluster ${{ secrets.ECS_CLUSTER }}             --task-definition "$NEW_ARN"             --launch-type FARGATE             --network-configuration "$NETWORK_CONFIG"             --overrides '{"containerOverrides":[{"name":"cybervault-backend","command":["python","-m","alembic","upgrade","head"]}]}'             --query 'tasks[0].taskArn'             --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ secrets.ECS_CLUSTER }} --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks             --cluster ${{ secrets.ECS_CLUSTER }}             --tasks "$TASK_ARN"             --query 'tasks[0].containers[0].exitCode'             --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi

          # Migrations OK -> point the service at the new revision
          aws ecs update-service             --cluster ${{ secrets.ECS_CLUSTER }}             --service ${{ secrets.ECS_SERVICE }}             --task-definition "$NEW_ARN"

          # Attendre la stabilisation ET verifier que le service tourne bien la NOUVELLE
          # revision : le circuit breaker ECS rollback silencieusement si le conteneur crashe,
          # et update-service rend la main immediatement (d'ou les faux succes passes).
          echo "Attente de la stabilisation du service ECS..."
          aws ecs wait services-stable --cluster ${{ secrets.ECS_CLUSTER }} --services ${{ secrets.ECS_SERVICE }} || true
          RUNNING=$(aws ecs describe-services --cluster ${{ secrets.ECS_CLUSTER }} --services ${{ secrets.ECS_SERVICE }} --query 'services[0].taskDefinition' --output text)
          if [ "$RUNNING" != "$NEW_ARN" ]; then
            echo "::error::Deploiement ECHOUE (rollback) : le service tourne $RUNNING au lieu de $NEW_ARN. Voir CloudWatch /ecs/cybervault-backend."
            exit 1
          fi
          echo "Deploiement stable sur $NEW_ARN"

  # ── Frontend : S3 + CloudFront ──────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build (production)
        run: npm ci --legacy-peer-deps && npm run build -- --configuration=production
        working-directory: frontend

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Sync assets (cache long terme — hash dans le nom de fichier)
        run: |
          aws s3 sync frontend/dist/cyber-vault-frontend/browser/ \
            s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html (pas de cache)
        run: |
          aws s3 cp frontend/dist/cyber-vault-frontend/browser/index.html \
            s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      # NOTE — le routage SPA ne passe PLUS par les CustomErrorResponses.
      #
      # Cette etape posait, a chaque deploiement :
      #   403 -> /index.html (200)   et   404 -> /index.html (200)
      # Or les CustomErrorResponses sont GLOBALES a la distribution : elles
      # s'appliquaient donc aussi aux comportements /api/* (origine ALB), et
      # transformaient tous les 403/404 de l'API en "200 + index.html". Un client
      # d'API (ou le front lui-meme) recevait du HTML avec un code 200 au lieu d'un
      # vrai 404/403 JSON.
      #
      # Le routage SPA est desormais assure par la CloudFront Function
      # `redirect-cyberscanapp-to-rocher` (viewer-request, attachee au comportement
      # par defaut uniquement) : elle reecrit vers /index.html les chemins sans
      # extension de fichier, et laisse /api/* intact. L'API renvoie donc ses vrais
      # codes. Ne pas reintroduire de CustomErrorResponses ici.

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── Recette post-prod : gate fonctionnel + rollback ECS auto ────────────────
  # Tourne APRES que le backend et le frontend soient deployes et stables. Valide
  # de vrais parcours (auth, coffre, scan, UI) contre la PROD avec un compte
  # canari dedie. Si la recette echoue -> rollback automatique du backend vers la
  # task def precedente.
  #
  # IMPORTANT — le rollback ne concerne QUE le backend (task def ECS) :
  #   * Il ne rejoue PAS les migrations a l'envers (le downgrade DB n'est jamais
  #     execute en prod). Les migrations DOIVENT donc rester retro-compatibles :
  #     l'image precedente doit tourner contre le schema deja migre (expand puis
  #     contract sur un deploiement ULTERIEUR). Une migration destructive-immediate
  #     casserait le rollback.
  #   * Il ne rollback PAS le frontend (S3/CloudFront) : le sync a deja remplace
  #     les assets. En cas d'echec purement front, corriger et redeployer.
  recette:
    name: Recette post-prod (gate + rollback)
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      RECETTE_BASE_URL: ${{ secrets.RECETTE_BASE_URL }}
      RECETTE_EMAIL:    ${{ secrets.RECETTE_EMAIL }}
      RECETTE_PASSWORD: ${{ secrets.RECETTE_PASSWORD }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install recette deps
        run: pip install -r backend/recette/requirements.txt

      - name: Recette API (auth, coffre, scan, cleanup)
        run: python -m pytest recette/ -c recette/pytest.ini
        working-directory: backend

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps + Playwright
        run: npm ci --legacy-peer-deps && npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Recette UI (Playwright vs prod)
        run: npx playwright test --config=playwright.recette.config.ts
        working-directory: frontend

      - name: Rollback ECS si la recette echoue
        if: failure()
        env:
          PREV: ${{ needs.deploy-backend.outputs.prev_task_def }}
        run: |
          set -euo pipefail
          if [ -z "${PREV:-}" ] || [ "$PREV" = "None" ]; then
            echo "::error::Recette KO mais task def precedente inconnue — rollback impossible, intervention manuelle requise (voir CloudWatch /ecs/cybervault-backend)."
            exit 1
          fi
          echo "::warning::Recette post-prod ECHOUEE -> rollback ECS backend vers $PREV"
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --task-definition "$PREV"
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE }} || true
          RUNNING=$(aws ecs describe-services \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE }} \
            --query 'services[0].taskDefinition' --output text)
          echo "::error::Recette echouee. Backend rollback vers $RUNNING. Le frontend (S3/CloudFront) N'EST PAS rollback automatiquement — verifier et redeployer si besoin."
          exit 1
