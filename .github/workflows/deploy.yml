# checkov:skip=CKV2_GHA_1: Actions pinned to major version tags — SHA pinning handled via Dependabot
name: Deploy — Production

on:
  push:
    branches: [main, master]

permissions:
  id-token: write   # required for OIDC token request
  contents: read

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: cybervault-backend

jobs:
  # ── Backend : ECR → ECS ─────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → ECR + ECS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build -f backend/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push    $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag     $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                         $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push    $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to ECS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
          # Secrets are stored in AWS Secrets Manager (cybervault/prod).
          # The task definition references them via valueFrom ARN — no plain
          # text secrets are passed through GitHub Actions env vars.
          SM_ARN: arn:aws:secretsmanager:eu-west-3:328646895533:secret:cybervault/prod-Uqdfdg
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          # Retrieve the current task definition ARN from the service
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE }} \
            --query 'services[0].taskDefinition' \
            --output text)

          # Build a new task definition JSON:
          #   - update the Docker image
          #   - remove sensitive env vars (now sourced from Secrets Manager)
          #   - set secrets[] array pointing to cybervault/prod ARN
          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query 'taskDefinition' \
            --output json | jq \
              --arg IMAGE      "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
              --arg SM_ARN     "$SM_ARN" \
              --arg PK_LIVE    "$STRIPE_PUBLISHABLE_KEY" \
              'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
               | .cpu = "1024"
               | .memory = "2048"
               | .containerDefinitions[0].image = $IMAGE
               | .containerDefinitions[0].environment = (
                   (.containerDefinitions[0].environment // [])
                   | map(select(
                       .name != "SECRET_KEY" and
                       .name != "DATABASE_URL" and
                       .name != "STRIPE_SECRET_KEY" and
                       .name != "STRIPE_WEBHOOK_SECRET" and
                       .name != "SMTP_PASSWORD" and
                       .name != "ADMIN_API_KEY" and
                       .name != "RESEND_API_KEY" and
                       .name != "SENTRY_DSN" and
                       .name != "STRIPE_PUBLISHABLE_KEY"
                     ))
                 + [{"name": "STRIPE_PUBLISHABLE_KEY", "value": $PK_LIVE}]
                 )
               | .containerDefinitions[0].secrets = [
                   {"name": "SECRET_KEY",            "valueFrom": ($SM_ARN + ":SECRET_KEY::")},
                   {"name": "DATABASE_URL",          "valueFrom": ($SM_ARN + ":DATABASE_URL::")},
                   {"name": "STRIPE_SECRET_KEY",     "valueFrom": ($SM_ARN + ":STRIPE_SECRET_KEY::")},
                   {"name": "STRIPE_WEBHOOK_SECRET", "valueFrom": ($SM_ARN + ":STRIPE_WEBHOOK_SECRET::")},
                   {"name": "SMTP_PASSWORD",         "valueFrom": ($SM_ARN + ":SMTP_PASSWORD::")},
                   {"name": "ADMIN_API_KEY",         "valueFrom": ($SM_ARN + ":ADMIN_API_KEY::")},
                   {"name": "RESEND_API_KEY",        "valueFrom": ($SM_ARN + ":RESEND_API_KEY::")},
                   {"name": "SENTRY_DSN",            "valueFrom": ($SM_ARN + ":SENTRY_DSN::")}
                 ]')

          # Register the new revision
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Update the service to use the new revision
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --task-definition "$NEW_ARN"

  # ── Frontend : S3 + CloudFront ──────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build (production)
        run: npm ci --legacy-peer-deps && npm run build -- --configuration=production
        working-directory: frontend

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Sync assets (cache long terme — hash dans le nom de fichier)
        run: |
          aws s3 sync frontend/dist/cyber-vault-frontend/browser/ \
            s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html (pas de cache)
        run: |
          aws s3 cp frontend/dist/cyber-vault-frontend/browser/index.html \
            s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Configure CloudFront SPA error pages (403/404 → index.html)
        run: |
          DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          CONFIG=$(aws cloudfront get-distribution-config --id "$DIST_ID")
          ETAG=$(echo "$CONFIG" | jq -r '.ETag')
          UPDATED=$(echo "$CONFIG" | jq '.DistributionConfig | .CustomErrorResponses = {
            "Quantity": 2,
            "Items": [
              {"ErrorCode": 403, "ResponsePagePath": "/index.html", "ResponseCode": "200", "ErrorCachingMinTTL": 300},
              {"ErrorCode": 404, "ResponsePagePath": "/index.html", "ResponseCode": "200", "ErrorCachingMinTTL": 300}
            ]
          }')
          aws cloudfront update-distribution \
            --id "$DIST_ID" \
            --distribution-config "$UPDATED" \
            --if-match "$ETAG"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
