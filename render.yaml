services:
  - type: web
    name: cyber-vault-backend-staging
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: staging
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: '["https://cyber-vault-frontend-staging.onrender.com"]'
      - key: MAX_LOGIN_ATTEMPTS
        value: 5
      - key: LOCKOUT_MINUTES
        value: 15

  - type: web
    name: cyber-vault-frontend-staging
    env: static
    region: frankfurt
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist/cyber-vault-frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
