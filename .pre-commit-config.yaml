repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # Secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # Python: ruff (lint + format — remplace black + isort)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Python: type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^backend/app/
        args: ["--ignore-missing-imports", "--no-strict-optional"]
        additional_dependencies:
          - pydantic>=2.0
          - sqlalchemy[mypy]>=2.0

  # Python: security audit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-ll", "-r", "backend/app/"]
        files: ^backend/app/

  # Frontend: Prettier (format)
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: node
        entry: frontend/node_modules/.bin/prettier --write
        files: ^frontend/src/.*\.(ts|html|scss)$
        additional_dependencies: []

  # Frontend: ESLint
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: node
        entry: frontend/node_modules/.bin/ng lint --fix
        files: ^frontend/src/.*\.ts$
        pass_filenames: false
        additional_dependencies: []

  # Conventional commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, refactor, test, docs, chore, perf, ci, build]
