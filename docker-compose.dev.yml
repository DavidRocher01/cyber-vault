services:
  postgres:
    image: postgres:17-alpine
    container_name: cybervault_dev_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cybervault
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cybervault_dev_backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      SECRET_KEY: dev-secret-key-not-for-production-64chars
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/cybervault
      ALLOWED_ORIGINS: '["http://localhost:4200"]'
      FRONTEND_URL: http://localhost:4200
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cybervault_dev_frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_dev_data:
