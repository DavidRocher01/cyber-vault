questions:
  - id: mob_01
    type: single_choice
    weight: 1
    text: "Quel type de verrouillage d'écran est le moins sécurisé ?"
    answers:
      - id: a
        text: "Code PIN à 6 chiffres"
        correct: false
      - id: b
        text: "Empreinte digitale"
        correct: false
      - id: c
        text: "Schéma de déverrouillage"
        correct: true
      - id: d
        text: "Reconnaissance faciale"
        correct: false
    explanation: "Les schémas sont prévisibles, souvent visibles sur l'écran (traces), et plus faciles à deviner que les autres méthodes."

  - id: mob_02
    type: true_false
    weight: 1
    text: "Les mises à jour du téléphone peuvent être retardées sans risque majeur."
    answers:
      - id: a
        text: "Vrai"
        correct: false
      - id: b
        text: "Faux"
        correct: true
    explanation: "Les mises à jour corrigent des failles de sécurité critiques parfois activement exploitées. Retarder les mises à jour laisse votre téléphone vulnérable."

  - id: mob_03
    type: single_choice
    weight: 1
    text: "Votre téléphone professionnel est perdu. Quelle est la première action ?"
    answers:
      - id: a
        text: "Attendre 24h avant d'agir"
        correct: false
      - id: b
        text: "Localiser, verrouiller à distance et prévenir l'IT immédiatement"
        correct: true
      - id: c
        text: "Changer vos mots de passe depuis un autre appareil uniquement"
        correct: false
      - id: d
        text: "Acheter un nouveau téléphone"
        correct: false
    explanation: "Agissez dans les 30 premières minutes. Localiser, verrouiller, effacer à distance si nécessaire, et alerter l'IT."

  - id: mob_04
    type: multiple_choice
    weight: 2
    text: "Quelles permissions une application de lampe de poche devrait-elle demander ? (plusieurs réponses)"
    answers:
      - id: a
        text: "Accès à la lampe torche"
        correct: true
      - id: b
        text: "Accès aux contacts"
        correct: false
      - id: c
        text: "Accès au microphone"
        correct: false
      - id: d
        text: "Accès à la localisation"
        correct: false
      - id: e
        text: "Accès aux photos"
        correct: false
    explanation: "Une lampe de poche n'a besoin que de l'accès à la torche. Toute autre permission doit éveiller votre méfiance."

  - id: mob_05
    type: single_choice
    weight: 1
    text: "Vous recevez un SMS d'un numéro inconnu avec un lien pour 'mettre à jour vos informations de livraison'. Que faites-vous ?"
    answers:
      - id: a
        text: "Cliquer pour voir de quelle livraison il s'agit"
        correct: false
      - id: b
        text: "Appliquer les mêmes réflexes qu'avec un email suspect — ne pas cliquer"
        correct: true
      - id: c
        text: "Répondre au SMS pour demander des précisions"
        correct: false
      - id: d
        text: "Transférer le SMS à un ami"
        correct: false
    explanation: "Le smishing (phishing par SMS) suit les mêmes patterns que le phishing email. Même réflexe : ne pas cliquer sur des liens non sollicités."
