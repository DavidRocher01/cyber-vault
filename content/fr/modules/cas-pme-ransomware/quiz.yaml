questions:
  - id: pr_01
    type: single_choice
    weight: 1
    text: "Quel a été le vecteur d'entrée du ransomware dans cette PME ?"
    answers:
      - id: a
        text: "Un accès VPN piraté"
        correct: false
      - id: b
        text: "Une macro activée dans un document Office"
        correct: true
      - id: c
        text: "Un mot de passe trop faible"
        correct: false
      - id: d
        text: "Une mise à jour logicielle corrompue"
        correct: false
    explanation: "Stéphane a activé les macros d'un document Excel reçu d'un 'fournisseur'. Le compte email du fournisseur avait été compromis, et les attaquants ont envoyé un document piégé depuis une adresse de confiance. Les macros Office sont l'un des vecteurs les plus utilisés car elles permettent d'exécuter du code arbitraire."

  - id: pr_02
    type: true_false
    weight: 1
    text: "Il est acceptable d'activer les macros d'un document Office reçu d'un fournisseur de confiance."
    answers:
      - id: a
        text: "Vrai"
        correct: false
      - id: b
        text: "Faux"
        correct: true
    explanation: "Non. Un fournisseur de confiance peut lui-même avoir été compromis. N'activez jamais les macros sur un document que vous n'attendiez pas explicitement. Si un document légitime nécessite des macros, votre IT peut vous guider pour vérifier son authenticité."

  - id: pr_03
    type: single_choice
    weight: 1
    text: "Quel a été le coût total de cet incident pour la PME ?"
    answers:
      - id: a
        text: "85 000 € (la rançon)"
        correct: false
      - id: b
        text: "Environ 28 000 € (reconstruction IT)"
        correct: false
      - id: c
        text: "Environ 530 000 €, sans payer la rançon"
        correct: true
      - id: d
        text: "Nul, les données ont été récupérées"
        correct: false
    explanation: "Le coût total (prestataire, perte de production, heures supplémentaires, clients perdus) atteint environ 530 000 €, soit plus de 6 fois le montant de la rançon. Et la PME a quand même perdu 3 semaines de données. La rançon n'est jamais la vraie mesure du coût d'un ransomware."

  - id: pr_04
    type: multiple_choice
    weight: 2
    text: "Quelles erreurs ont aggravé l'impact de l'incident ? (plusieurs réponses)"
    answers:
      - id: a
        text: "Ne pas avoir signalé l'anomalie du fichier à l'IT"
        correct: true
      - id: b
        text: "Tenter de nettoyer le virus soi-même"
        correct: true
      - id: c
        text: "Brancher une clé USB personnelle pendant l'incident"
        correct: true
      - id: d
        text: "Appeler le prestataire IT"
        correct: false
      - id: e
        text: "Avoir des sauvegardes connectées en permanence au réseau"
        correct: true
    explanation: "Plusieurs erreurs ont aggravé la situation : ne pas signaler l'anomalie initiale (perte de 3h précieuses), tenter de nettoyer soi-même (destruction de preuves), brancher une clé USB (perte de la sauvegarde personnelle), et avoir des sauvegardes réseau (chiffrées comme le reste). Appeler le prestataire était la bonne action — mais trop tardive."

  - id: pr_05
    type: single_choice
    weight: 1
    text: "Quel est le rapport coût/bénéfice des mesures préventives pour cette PME ?"
    answers:
      - id: a
        text: "Les mesures sont trop coûteuses pour une PME de 45 personnes"
        correct: false
      - id: b
        text: "Les mesures préventives (12 000 €) représentent environ 2 % du coût de l'incident (530 000 €)"
        correct: true
      - id: c
        text: "Les mesures préventives coûtent autant que l'incident"
        correct: false
      - id: d
        text: "Les mesures préventives sont inutiles face aux attaquants professionnels"
        correct: false
    explanation: "Les mesures préventives mises en place après l'incident (MFA, formation, règles macros, sauvegardes, assurance) ont coûté environ 12 000 €. L'incident a coûté 530 000 €. La prévention représente 2 % du coût de l'incident. C'est l'un des meilleurs retours sur investissement en entreprise."

  - id: pr_06
    type: true_false
    weight: 1
    text: "Si la PME avait payé la rançon (85 000 €), elle aurait récupéré toutes ses données."
    answers:
      - id: a
        text: "Vrai"
        correct: false
      - id: b
        text: "Faux"
        correct: true
    explanation: "Payer la rançon ne garantit pas la récupération des données. Selon les statistiques, environ 40 % des organisations qui paient ne récupèrent pas l'intégralité de leurs données. De plus, payer finance les attaquants et vous identifie comme une cible qui paye — augmentant le risque d'une nouvelle attaque."

  - id: pr_07
    type: single_choice
    weight: 2
    text: "Quelle règle de sauvegarde aurait permis une reprise rapide dans ce cas ?"
    answers:
      - id: a
        text: "Avoir deux copies sur le même serveur"
        correct: false
      - id: b
        text: "La règle 3-2-1 : 3 copies, 2 supports différents, 1 hors-site/hors-ligne"
        correct: true
      - id: c
        text: "Sauvegarder uniquement les fichiers les plus récents"
        correct: false
      - id: d
        text: "Faire une sauvegarde mensuelle dans le cloud"
        correct: false
    explanation: "La règle 3-2-1 est le standard : 3 copies des données, sur 2 supports différents (ex : disque local + NAS), dont 1 hors-ligne ou hors-site (ex : bande magnétique, sauvegarde cloud non synchronisée). La copie hors-ligne est celle qui résiste aux ransomwares, car ils ne peuvent pas la chiffrer à distance."

  - id: pr_08
    type: single_choice
    weight: 1
    text: "Si vous trouvez un document anormal dans votre boîte email (qui ne s'ouvre pas, macros demandées), que faites-vous ?"
    answers:
      - id: a
        text: "Réessayer d'ouvrir le document plusieurs fois"
        correct: false
      - id: b
        text: "Supprimer l'email et l'oublier"
        correct: false
      - id: c
        text: "Signaler immédiatement à votre IT, même si vous n'avez rien activé"
        correct: true
      - id: d
        text: "Envoyer le document à votre IT pour qu'il l'analyse"
        correct: false
    explanation: "Signalez toujours à votre IT, même si vous n'avez rien fait. L'IT peut analyser l'email, bloquer l'expéditeur et vérifier si d'autres employés ont reçu le même message. Ne supprimez pas l'email vous-même — l'IT en a besoin pour l'analyse. Et n'envoyez pas le fichier suspect par email — vous pourriez propager l'infection."
