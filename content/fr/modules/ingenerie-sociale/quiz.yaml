questions:
  - id: is_01
    type: single_choice
    weight: 1
    text: "Vous recevez un appel d'un 'technicien Microsoft' affirmant avoir détecté un virus sur votre ordinateur. Il vous demande votre identifiant pour intervenir. Que faites-vous ?"
    answers:
      - id: a
        text: "Lui donner votre identifiant — Microsoft connaît son métier"
        correct: false
      - id: b
        text: "Raccrocher et contacter votre IT interne"
        correct: true
      - id: c
        text: "Lui demander de patienter et appeler un collègue"
        correct: false
      - id: d
        text: "Lui donner uniquement votre prénom pour voir"
        correct: false
    explanation: "Microsoft ne vous appelle jamais spontanément pour signaler un virus. C'est une arnaque classique (tech support scam). Raccrochez et contactez votre IT interne si vous avez un doute sur votre poste."

  - id: is_02
    type: single_choice
    weight: 1
    text: "Qu'est-ce que le 'tailgating' ?"
    answers:
      - id: a
        text: "Un type d'attaque par email ciblant les dirigeants"
        correct: false
      - id: b
        text: "Suivre quelqu'un dans une zone sécurisée sans badge en profitant d'une porte ouverte"
        correct: true
      - id: c
        text: "Surveiller l'écran d'un collègue par-dessus l'épaule"
        correct: false
      - id: d
        text: "Fouiller les poubelles d'une entreprise"
        correct: false
    explanation: "Le tailgating exploite la politesse naturelle des employés. La règle est stricte : chacun doit badger individuellement, même si c'est gênant de refuser à quelqu'un qui suit."

  - id: is_03
    type: true_false
    weight: 1
    text: "Demander à vérifier l'identité d'un appelant externe avant de lui donner des informations est impoli et contre-productif."
    answers:
      - id: a
        text: "Vrai"
        correct: false
      - id: b
        text: "Faux"
        correct: true
    explanation: "C'est une pratique professionnelle normale. Un appelant légitime comprendra et appréciera votre vigilance. Un attaquant insistera ou deviendra agressif — ce qui est lui-même un signal d'alarme."

  - id: is_04
    type: multiple_choice
    weight: 2
    text: "Quelles situations constituent une attaque potentielle par ingénierie sociale physique ? (plusieurs réponses)"
    answers:
      - id: a
        text: "Un technicien non annoncé qui se présente pour 'vérifier l'installation réseau'"
        correct: true
      - id: b
        text: "Un livreur qui demande à accéder au bureau pour déposer un colis"
        correct: true
      - id: c
        text: "Un visiteur attendu qui signe le registre d'accueil"
        correct: false
      - id: d
        text: "Quelqu'un qui entre derrière vous en laissant la porte ouverte"
        correct: true
      - id: e
        text: "Un collègue connu qui oublie son badge"
        correct: true
    explanation: "Toutes ces situations méritent une vérification — y compris le collègue sans badge (des attaquants se font passer pour des employés). La seule situation légitime sans vérification est le visiteur attendu avec identification formelle."

  - id: is_05
    type: single_choice
    weight: 1
    text: "Qu'est-ce que le 'prétexting' ?"
    answers:
      - id: a
        text: "Envoyer un email avant d'appeler pour valider l'identité"
        correct: false
      - id: b
        text: "Créer un scénario fictif pour extraire des informations ou déclencher une action"
        correct: true
      - id: c
        text: "Prétendre ne pas avoir reçu un email"
        correct: false
      - id: d
        text: "Un type d'attaque sur les réseaux sociaux"
        correct: false
    explanation: "Le prétexting consiste à créer une histoire crédible pour justifier une demande inhabituelle. 'Je suis de l'audit', 'Je suis la secrétaire du PDG', 'Je suis du support IT' — ces scénarios abaissent la méfiance."

  - id: is_06
    type: true_false
    weight: 1
    text: "Jeter des documents professionnels à la poubelle ordinaire est acceptable s'ils ne semblent pas très importants."
    answers:
      - id: a
        text: "Vrai"
        correct: false
      - id: b
        text: "Faux"
        correct: true
    explanation: "Le dumpster diving (fouille des poubelles) est une technique réelle. Tout document contenant des données de l'entreprise, même apparemment anodins (organigramme, noms de projets), va au destructeur."

  - id: is_07
    type: single_choice
    weight: 1
    text: "Vous travaillez dans un café. Un inconnu assis derrière vous pourrait voir votre écran. Quelle est la meilleure protection ?"
    answers:
      - id: a
        text: "Baisser la luminosité de l'écran"
        correct: false
      - id: b
        text: "Utiliser un filtre de confidentialité sur l'écran"
        correct: true
      - id: c
        text: "Travailler rapidement pour limiter l'exposition"
        correct: false
      - id: d
        text: "Passer en mode écran de veille si quelqu'un s'approche"
        correct: false
    explanation: "Un filtre de confidentialité (privacy filter) rend l'écran illisible pour toute personne n'étant pas directement face à lui. C'est la protection la plus efficace contre le shoulder surfing en mobilité."

  - id: is_08
    type: single_choice
    weight: 1
    text: "Un appelant crée une urgence forte pour vous pousser à agir vite sans vérifier. Quelle est la bonne réaction ?"
    answers:
      - id: a
        text: "Agir rapidement pour résoudre l'urgence"
        correct: false
      - id: b
        text: "Ralentir délibérément — l'urgence est le principal outil de manipulation"
        correct: true
      - id: c
        text: "Raccrocher sans rien dire"
        correct: false
      - id: d
        text: "Demander de l'aide à un collègue présent"
        correct: false
    explanation: "L'urgence artificielle est le moteur de l'ingénierie sociale. Elle empêche la réflexion. Ralentir délibérément et vérifier est la réponse correcte — aucune vraie urgence ne justifie de court-circuiter les vérifications."
