questions:
  - id: mdp_01
    type: single_choice
    weight: 1
    text: "Quelle est la longueur minimale recommandée pour un mot de passe solide ?"
    answers:
      - id: a
        text: "6 caractères"
        correct: false
      - id: b
        text: "8 caractères"
        correct: false
      - id: c
        text: "12 caractères"
        correct: true
      - id: d
        text: "20 caractères obligatoires"
        correct: false
    explanation: "12 caractères est le minimum recommandé. Plus c'est long, plus c'est sûr."

  - id: mdp_02
    type: true_false
    weight: 1
    text: "Utiliser le même mot de passe sur tous ses comptes est acceptable si il est complexe."
    answers:
      - id: a
        text: "Vrai"
        correct: false
      - id: b
        text: "Faux"
        correct: true
    explanation: "Un seul mot de passe pour tout = un seul site piraté suffit pour compromettre tous vos comptes (credential stuffing)."

  - id: mdp_03
    type: single_choice
    weight: 1
    text: "Quelle est la meilleure façon de gérer de nombreux mots de passe uniques ?"
    answers:
      - id: a
        text: "Un fichier Excel sur le bureau"
        correct: false
      - id: b
        text: "Un post-it sur l'écran"
        correct: false
      - id: c
        text: "Un gestionnaire de mots de passe"
        correct: true
      - id: d
        text: "Les mémoriser tous"
        correct: false
    explanation: "Un gestionnaire de mots de passe (KeePass, Bitwarden...) stocke vos mots de passe chiffrés et en génère des nouveaux forts."

  - id: mdp_04
    type: multiple_choice
    weight: 2
    text: "Lesquels de ces mots de passe sont considérés comme faibles ? (plusieurs réponses)"
    answers:
      - id: a
        text: "motdepasse123"
        correct: true
      - id: b
        text: "J'aime-le-café-chaud-le-matin!"
        correct: false
      - id: c
        text: "s3cur1ty"
        correct: true
      - id: d
        text: "p@ssw0rd"
        correct: true
      - id: e
        text: "Xk9#mL2$vQn7@pR4"
        correct: false
    explanation: "Les substitutions évidentes (3→e, @→a) et les mots courants sont facilement craqués par les outils automatisés."

  - id: mdp_05
    type: single_choice
    weight: 1
    text: "Un collègue vous demande votre mot de passe par email pour accéder à un fichier partagé. Que faites-vous ?"
    answers:
      - id: a
        text: "Vous le lui envoyez en le chiffrant dans l'email"
        correct: false
      - id: b
        text: "Vous refusez — jamais de partage par email"
        correct: true
      - id: c
        text: "Vous créez un mot de passe temporaire"
        correct: false
      - id: d
        text: "Vous changez votre mot de passe après"
        correct: false
    explanation: "Les mots de passe ne se partagent JAMAIS par email. Utilisez un accès partagé natif (dossier partagé, lien sécurisé)."

  - id: mdp_06
    type: true_false
    weight: 1
    text: "La technique de la phrase secrète (ex: 'J'aime-le-café-le-matin!') est moins sécurisée qu'un mot de passe court et complexe."
    answers:
      - id: a
        text: "Vrai"
        correct: false
      - id: b
        text: "Faux"
        correct: true
    explanation: "Une phrase secrète longue est souvent PLUS sécurisée : sa longueur la rend très difficile à craquer et elle est plus facile à mémoriser."
