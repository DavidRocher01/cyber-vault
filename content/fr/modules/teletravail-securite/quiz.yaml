questions:
  - id: tt_01
    type: single_choice
    weight: 1
    text: "Votre VPN d'entreprise ralentit votre connexion internet. Que faites-vous ?"
    answers:
      - id: a
        text: "Le désactiver pour aller plus vite"
        correct: false
      - id: b
        text: "Signaler le problème à l'IT et continuer à l'utiliser"
        correct: true
      - id: c
        text: "L'activer uniquement pour les accès aux ressources internes"
        correct: false
      - id: d
        text: "Utiliser une connexion hotspot pour contourner"
        correct: false
    explanation: "Le VPN est obligatoire — ses problèmes de performance doivent être remontés à l'IT, jamais contournés. Il protège l'ensemble de votre trafic professionnel."

  - id: tt_02
    type: true_false
    weight: 1
    text: "Laisser ses enfants utiliser brièvement l'ordinateur professionnel est acceptable si c'est juste pour faire leurs devoirs."
    answers:
      - id: a
        text: "Vrai"
        correct: false
      - id: b
        text: "Faux"
        correct: true
    explanation: "L'ordinateur professionnel ne doit jamais être partagé. Un usage familial peut introduire des malwares, modifier des configurations, ou exposer des données confidentielles."

  - id: tt_03
    type: single_choice
    weight: 1
    text: "Pourquoi est-il recommandé de créer un réseau Wi-Fi invité séparé pour les appareils professionnels ?"
    answers:
      - id: a
        text: "Pour améliorer la vitesse de connexion"
        correct: false
      - id: b
        text: "Pour isoler le poste de travail des appareils IoT potentiellement compromis"
        correct: true
      - id: c
        text: "Pour économiser la batterie des appareils"
        correct: false
      - id: d
        text: "C'est une exigence légale RGPD"
        correct: false
    explanation: "Les appareils IoT (TV, enceintes, consoles) sont souvent peu sécurisés et peuvent être compromis. Les isoler sur un réseau séparé protège votre poste professionnel d'une propagation latérale."

  - id: tt_04
    type: multiple_choice
    weight: 2
    text: "Quelles actions sécurisent votre routeur domestique ? (plusieurs réponses)"
    answers:
      - id: a
        text: "Changer le mot de passe administrateur par défaut"
        correct: true
      - id: b
        text: "Activer le chiffrement WPA2 ou WPA3"
        correct: true
      - id: c
        text: "Nommer le réseau avec votre adresse pour le retrouver facilement"
        correct: false
      - id: d
        text: "Mettre à jour le firmware du routeur"
        correct: true
      - id: e
        text: "Désactiver la gestion à distance si vous ne l'utilisez pas"
        correct: true
    explanation: "Mot de passe admin, chiffrement fort, firmware à jour et désactivation des accès inutiles sont les mesures de base. Le nom du réseau ne doit pas révéler votre adresse ou votre opérateur."

  - id: tt_05
    type: single_choice
    weight: 1
    text: "Vous participez à une réunion vidéo confidentielle depuis chez vous. Votre enceinte connectée (Alexa) est à portée. Que faites-vous ?"
    answers:
      - id: a
        text: "Rien — les enceintes n'enregistrent que sur commande vocale"
        correct: false
      - id: b
        text: "Désactiver l'enceinte ou vous éloigner de sa portée pendant l'appel"
        correct: true
      - id: c
        text: "Mettre l'appel en sourdine pendant les passages sensibles"
        correct: false
      - id: d
        text: "Parler moins fort"
        correct: false
    explanation: "Les enceintes intelligentes écoutent en permanence pour détecter leur mot d'activation. Lors d'appels confidentiels, désactivez-les ou éloignez-vous. Le risque d'écoute involontaire est réel."

  - id: tt_06
    type: true_false
    weight: 1
    text: "Verrouiller son écran (Win+L) avant de se lever quelques minutes est une précaution inutile à domicile."
    answers:
      - id: a
        text: "Vrai"
        correct: false
      - id: b
        text: "Faux"
        correct: true
    explanation: "Même à domicile, toute personne présente (famille, visiteur, technicien) pourrait accéder à des données confidentielles sur un écran déverrouillé. La règle de verrouillage s'applique partout."

  - id: tt_07
    type: single_choice
    weight: 1
    text: "Votre connexion internet tombe pendant le télétravail. Vous utilisez le hotspot de votre téléphone personnel. Quelle précaution prendre ?"
    answers:
      - id: a
        text: "Aucune — le hotspot est chiffré par défaut"
        correct: false
      - id: b
        text: "Activer le VPN d'entreprise sur la connexion hotspot"
        correct: true
      - id: c
        text: "Ne pas travailler jusqu'au retour de la connexion principale"
        correct: false
      - id: d
        text: "Désactiver le VPN car le hotspot est personnel"
        correct: false
    explanation: "Le hotspot personnel est plus sûr que le Wi-Fi public, mais le VPN d'entreprise reste obligatoire sur toute connexion externe pour protéger le trafic professionnel."

  - id: tt_08
    type: multiple_choice
    weight: 2
    text: "Quels risques spécifiques au télétravail doivent être gérés ? (plusieurs réponses)"
    answers:
      - id: a
        text: "Routeur domestique non sécurisé comme vecteur d'entrée"
        correct: true
      - id: b
        text: "Partage d'appareils avec la famille"
        correct: true
      - id: c
        text: "Écoutes involontaires lors d'appels confidentiels"
        correct: true
      - id: d
        text: "Vitesse internet plus lente qu'au bureau"
        correct: false
      - id: e
        text: "Documents papier confidentiels visibles ou accessibles"
        correct: true
    explanation: "Les risques du télétravail sont réels : réseau non sécurisé, partage matériel, écoutes et documents non protégés. La vitesse internet est un confort, pas un risque de sécurité."
