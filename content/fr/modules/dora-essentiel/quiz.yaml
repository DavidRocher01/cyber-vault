questions:
  - id: dora_01
    type: single_choice
    weight: 1
    text: "À partir de quand DORA est-il en vigueur ?"
    answers:
      - id: a
        text: "Janvier 2023"
        correct: false
      - id: b
        text: "Janvier 2025"
        correct: true
      - id: c
        text: "Décembre 2027"
        correct: false
      - id: d
        text: "Il n'est pas encore en vigueur"
        correct: false
    explanation: "DORA (Digital Operational Resilience Act) est entré en application le 17 janvier 2025. Contrairement à NIS2 qui est transposé par les États membres, DORA est un règlement européen directement applicable dans tous les États membres sans transposition nationale."

  - id: dora_02
    type: multiple_choice
    weight: 2
    text: "Quelles entités sont directement concernées par DORA ? (plusieurs réponses)"
    answers:
      - id: a
        text: "Banques et établissements de crédit"
        correct: true
      - id: b
        text: "Compagnies d'assurance"
        correct: true
      - id: c
        text: "Hôpitaux et cliniques"
        correct: false
      - id: d
        text: "Plateformes de crypto-actifs"
        correct: true
      - id: e
        text: "Entreprises industrielles non financières"
        correct: false
    explanation: "DORA cible spécifiquement le secteur financier : banques, assureurs, gestionnaires de fonds, entreprises d'investissement, établissements de paiement et plateformes de crypto-actifs. Les hôpitaux et entreprises industrielles sont couverts par NIS2, pas par DORA."

  - id: dora_03
    type: single_choice
    weight: 2
    text: "Quel est le délai DORA pour notifier un incident majeur à l'autorité compétente ?"
    answers:
      - id: a
        text: "24 heures (comme NIS2)"
        correct: false
      - id: b
        text: "4 heures"
        correct: true
      - id: c
        text: "1 heure"
        correct: false
      - id: d
        text: "72 heures"
        correct: false
    explanation: "DORA impose une notification initiale dans les 4 heures suivant la détection d'un incident majeur — contre 24h pour NIS2. Cette exigence plus stricte reflète l'impact systémique potentiel des incidents dans le secteur financier. Un incident bancaire peut se propager à l'ensemble du système financier en quelques heures."

  - id: dora_04
    type: single_choice
    weight: 1
    text: "Qu'est-ce que le pilier 'Gestion des risques tiers' (Third-Party Risk) impose selon DORA ?"
    answers:
      - id: a
        text: "Interdire l'utilisation de prestataires cloud étrangers"
        correct: false
      - id: b
        text: "Cartographier les prestataires IT, inclure des clauses contractuelles spécifiques et surveiller en continu"
        correct: true
      - id: c
        text: "Exiger que tous les prestataires soient certifiés ISO 27001"
        correct: false
      - id: d
        text: "Limiter le nombre de prestataires à 10 maximum"
        correct: false
    explanation: "Le pilier tiers de DORA est l'un des plus novateurs : les entités financières doivent cartographier leurs dépendances IT, inclure des clauses contractuelles précises (droits d'audit, SLA sécurité, procédures incident), et surveiller continuellement les prestataires critiques. La Commission Européenne peut même désigner certains prestataires comme 'critiques' et les superviser directement."

  - id: dora_05
    type: true_false
    weight: 1
    text: "DORA remplace NIS2 pour les entités du secteur financier."
    answers:
      - id: a
        text: "Vrai"
        correct: false
      - id: b
        text: "Faux"
        correct: true
    explanation: "DORA et NIS2 coexistent. NIS2 s'applique à tous les secteurs critiques, DORA ajoute des exigences spécifiques et plus strictes pour le secteur financier. Une banque doit être conforme aux deux — mais DORA est considéré comme lex specialis (loi spéciale) et prime sur NIS2 quand les deux traitent du même sujet."

  - id: dora_06
    type: single_choice
    weight: 1
    text: "Qu'est-ce que les tests TLPT imposés par DORA ?"
    answers:
      - id: a
        text: "Des tests de charge pour vérifier la performance des systèmes"
        correct: false
      - id: b
        text: "Des simulations d'attaques réelles menées par des testeurs certifiés, tous les 3 ans"
        correct: true
      - id: c
        text: "Des questionnaires de conformité annuels"
        correct: false
      - id: d
        text: "Des audits comptables des dépenses IT"
        correct: false
    explanation: "Les TLPT (Threat-Led Penetration Testing) sont des tests de pénétration avancés simulant des attaques réelles, menés par des équipes certifiées selon une méthodologie TIBER-EU. Ils sont obligatoires tous les 3 ans pour les entités financières importantes. L'objectif est de tester la résilience réelle, pas seulement la conformité documentaire."

  - id: dora_07
    type: single_choice
    weight: 2
    text: "Jusqu'à quel montant peut aller l'amende DORA pour non-conformité ?"
    answers:
      - id: a
        text: "100 000 euros"
        correct: false
      - id: b
        text: "1 % du CA journalier moyen mondial par jour de non-conformité"
        correct: true
      - id: c
        text: "10 millions d'euros maximum"
        correct: false
      - id: d
        text: "Les mêmes montants que NIS2"
        correct: false
    explanation: "DORA prévoit des sanctions pouvant atteindre 1 % du CA journalier moyen mondial par jour de non-conformité. Pour les prestataires critiques désignés par la Commission, les amendes peuvent atteindre 5 millions d'euros ou 10 % du CA annuel. C'est un mécanisme pensé pour être dissuasif même pour les grandes institutions financières."
