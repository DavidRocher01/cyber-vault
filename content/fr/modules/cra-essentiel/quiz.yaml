questions:
  - id: cra_01
    type: single_choice
    weight: 1
    text: "Quel problème principal le Cyber Resilience Act (CRA) cherche-t-il à résoudre ?"
    answers:
      - id: a
        text: "Le manque de formation des employés en cybersécurité"
        correct: false
      - id: b
        text: "L'absence d'obligations de sécurité pour les fabricants de produits numériques"
        correct: true
      - id: c
        text: "Les cyberattaques contre les services publics"
        correct: false
      - id: d
        text: "Le manque de coopération entre États membres sur les incidents"
        correct: false
    explanation: "Le CRA répond à un constat simple : des milliards d'appareils connectés sont vendus en Europe sans aucune obligation de sécurité pour leurs fabricants. Le résultat est un marché inondé d'équipements vulnérables utilisés comme vecteurs d'attaque. Le CRA inverse la charge : les fabricants sont désormais responsables de la sécurité de leurs produits."

  - id: cra_02
    type: single_choice
    weight: 1
    text: "Jusqu'en quelle date les produits numériques mis sur le marché européen doivent-ils être conformes au CRA ?"
    answers:
      - id: a
        text: "Décembre 2024"
        correct: false
      - id: b
        text: "Septembre 2026"
        correct: false
      - id: c
        text: "Décembre 2027"
        correct: true
      - id: d
        text: "Janvier 2030"
        correct: false
    explanation: "La pleine application du CRA est prévue pour décembre 2027. Les obligations de notification des incidents s'appliquent dès septembre 2026. Ce délai de 3 ans vise à laisser aux fabricants le temps d'adapter leurs processus de développement et leurs gammes de produits."

  - id: cra_03
    type: multiple_choice
    weight: 2
    text: "Quelles sont les exigences 'Security by Design' imposées par le CRA ? (plusieurs réponses)"
    answers:
      - id: a
        text: "Pas de mots de passe par défaut identiques pour tous les appareils"
        correct: true
      - id: b
        text: "Surface d'attaque minimale — services non nécessaires désactivés par défaut"
        correct: true
      - id: c
        text: "Chiffrement de toutes les données, y compris publiques"
        correct: false
      - id: d
        text: "Authentification forte disponible"
        correct: true
      - id: e
        text: "Obligation d'utiliser uniquement des composants open source"
        correct: false
    explanation: "Le 'Security by Design' du CRA impose : pas de mots de passe par défaut partagés (chaque appareil doit avoir un identifiant unique), surface d'attaque minimale (services inutiles désactivés), authentification forte disponible, et chiffrement des données sensibles. L'open source n'est pas imposé — le CRA est neutre technologiquement."

  - id: cra_04
    type: single_choice
    weight: 1
    text: "Quelle est la durée minimale de support de sécurité imposée par le CRA ?"
    answers:
      - id: a
        text: "1 an"
        correct: false
      - id: b
        text: "3 ans"
        correct: false
      - id: c
        text: "5 ans"
        correct: true
      - id: d
        text: "10 ans"
        correct: false
    explanation: "Le CRA impose au minimum 5 ans de support de sécurité (ou la durée de vie prévue du produit si elle est plus longue). C'est une rupture majeure : auparavant, les fabricants pouvaient arrêter le support après quelques mois. Cette obligation force à concevoir des produits maintenables sur le long terme."

  - id: cra_05
    type: single_choice
    weight: 2
    text: "Qu'est-ce qu'un SBOM (Software Bill of Materials) ?"
    answers:
      - id: a
        text: "Un budget prévisionnel pour les mises à jour de sécurité"
        correct: false
      - id: b
        text: "La liste détaillée de tous les composants logiciels inclus dans un produit"
        correct: true
      - id: c
        text: "Un rapport d'audit de sécurité annuel"
        correct: false
      - id: d
        text: "Un certificat de conformité délivré par une autorité européenne"
        correct: false
    explanation: "Le SBOM (Software Bill of Materials) est l'inventaire complet des composants logiciels d'un produit : bibliothèques open source, modules tiers, dépendances. Le CRA impose aux fabricants de maintenir un SBOM à jour. Pour les acheteurs, c'est un outil précieux : si une vulnérabilité est découverte dans un composant, on sait immédiatement quels produits sont affectés."

  - id: cra_06
    type: true_false
    weight: 1
    text: "Le CRA concerne uniquement les fabricants d'équipements IoT (caméras, thermostats, etc.)."
    answers:
      - id: a
        text: "Vrai"
        correct: false
      - id: b
        text: "Faux"
        correct: true
    explanation: "Non. Le CRA s'applique à tous les 'produits comportant des éléments numériques' : équipements IoT, mais aussi logiciels commerciaux, applications mobiles, SaaS, systèmes d'exploitation, composants réseau, outils de cybersécurité... En pratique, presque tout produit numérique vendu en Europe est concerné."

  - id: cra_07
    type: single_choice
    weight: 1
    text: "Quelle est la différence principale entre NIS2 et le CRA ?"
    answers:
      - id: a
        text: "NIS2 concerne les grandes entreprises, le CRA les PME"
        correct: false
      - id: b
        text: "NIS2 régule les organisations utilisatrices, le CRA régule les fabricants de produits"
        correct: true
      - id: c
        text: "NIS2 est européen, le CRA est français"
        correct: false
      - id: d
        text: "NIS2 impose des amendes, le CRA non"
        correct: false
    explanation: "NIS2 et CRA sont complémentaires. NIS2 impose des obligations aux organisations qui UTILISENT des systèmes IT critiques (comment gérer leur sécurité). Le CRA impose des obligations aux FABRICANTS qui conçoivent et vendent des produits numériques (comment sécuriser leurs produits). Ensemble, ils couvrent toute la chaîne : du produit à son utilisateur."

  - id: cra_08
    type: single_choice
    weight: 2
    text: "Quelle amende le CRA prévoit-il pour une non-conformité aux exigences essentielles ?"
    answers:
      - id: a
        text: "500 000 euros maximum"
        correct: false
      - id: b
        text: "5 millions d'euros maximum"
        correct: false
      - id: c
        text: "15 millions d'euros ou 2,5 % du CA mondial annuel"
        correct: true
      - id: d
        text: "Les mêmes montants que NIS2 (10 millions)"
        correct: false
    explanation: "Le CRA prévoit des amendes jusqu'à 15 millions d'euros ou 2,5 % du CA mondial pour les non-conformités aux exigences essentielles. Pour les fausses déclarations de conformité, c'est 5 millions ou 1 % du CA. Ces montants élevés visent à dissuader les fabricants de prendre des raccourcis sur la sécurité."
