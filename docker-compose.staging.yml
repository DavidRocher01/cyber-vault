services:
  postgres:
    image: postgres:17-alpine
    container_name: cybervault_staging_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: staging_password
      POSTGRES_DB: cybervault_staging
    ports:
      - "5433:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybervault_staging_backend
    environment:
      APP_ENV: staging
      SECRET_KEY: staging-secret-key-change-in-prod-64chars-minimum
      DATABASE_URL: postgresql+asyncpg://postgres:staging_password@postgres:5432/cybervault_staging
      ALLOWED_ORIGINS: '["http://localhost:4201"]'
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://localhost:8001/api/v1
    container_name: cybervault_staging_frontend
    ports:
      - "4201:80"
    depends_on:
      - backend

volumes:
  postgres_staging_data:
