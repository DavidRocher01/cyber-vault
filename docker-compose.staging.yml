# checkov:skip=CKV_SECRET_6,CKV_SECRET_80: Placeholder values reference env vars — real secrets injected at runtime
services:
  postgres:
    image: postgres:17-alpine
    container_name: cybervault_staging_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: staging_password
      POSTGRES_DB: cybervault_staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cybervault_staging_backend
    restart: unless-stopped
    environment:
      APP_ENV: staging
      SECRET_KEY: staging-secret-key-change-in-prod-64chars-minimum
      DATABASE_URL: postgresql+asyncpg://postgres:staging_password@postgres:5432/cybervault_staging
      ALLOWED_ORIGINS: '["http://localhost:4201"]'
      FRONTEND_URL: http://localhost:4201
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cybervault_staging_frontend
    ports:
      - "4201:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_staging_data:
